name: appmovil
description: "Aplicación móvil de gestión financiera personal"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.3
  firebase_messaging: ^15.2.5
  cloud_firestore: ^5.6.0

  # Gestión de estado
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7

  # Cliente HTTP
  dio: ^5.8.0+1

  # Base de datos local
  sqflite: ^2.4.2
  path: ^1.9.1

  # Preferencias locales
  shared_preferences: ^2.5.3

  # Formato de fechas y moneda
  intl: ^0.20.2

  # Gráficos
  fl_chart: ^0.70.2

  # Serialización JSON
  json_annotation: ^4.9.0

  # Entorno
  flutter_dotenv: ^5.1.0

  # IA alternativa gratuita (Gemini)
  google_generative_ai: ^0.4.7

  # Notificaciones locales
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.1

  # Abrir URLs (WhatsApp)
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  json_serializable: ^6.9.5

flutter:
  uses-material-design: true
  assets:
    - .env
    - logo.jpg
